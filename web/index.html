<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>🐍 Snake Multiplayer</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════ OVERLAYS ═══════════════════════ -->

<!-- Connecting -->
<div id="connectingOverlay" class="overlay">
  <div class="overlay-card">
    <div class="logo">🐍</div>
    <h1>Snake Multiplayer</h1>
    <p class="sub">Connecting to server…</p>
    <div class="spinner"></div>
  </div>
</div>

<!-- Lobby / name entry -->
<div id="lobbyOverlay" class="overlay hidden">
  <div class="overlay-card">
    <div class="logo">🐍</div>
    <h1>Snake Multiplayer</h1>

    <div id="nameSection">
      <input id="nameInput" type="text" maxlength="16"
             placeholder="Your name" autocomplete="off" spellcheck="false" />
      <button id="joinBtn" class="btn-primary">Join Lobby</button>
    </div>

    <div id="lobbySection" class="hidden">
      <div id="playerList"></div>

      <!-- Settings (only visible to lobby players, not spectators) -->
      <div id="settingsPanel">
        <div class="settings-row">
          <span class="settings-label">Mode</span>
          <div class="settings-btns" id="settingMode">
            <button class="sbtn active" data-value="classic">Classic</button>
            <button class="sbtn" data-value="kurve">Kurve</button>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">Speed</span>
          <div class="settings-btns" id="settingSpeed">
            <button class="sbtn active" data-value="normal">Normal</button>
            <button class="sbtn" data-value="fast">Fast</button>
            <button class="sbtn" data-value="ultra">Ultra</button>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">Walls</span>
          <div class="settings-btns" id="settingWalls">
            <button class="sbtn active" data-value="true">On</button>
            <button class="sbtn" data-value="false">Off (wrap)</button>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">Shrink</span>
          <div class="settings-btns" id="settingShrink">
            <button class="sbtn active" data-value="true">On (battle royale)</button>
            <button class="sbtn" data-value="false">Off</button>
          </div>
        </div>
        <div class="settings-row">
          <span class="settings-label">Weapons</span>
          <div class="settings-btns" id="settingWeapons">
            <button class="sbtn wbtn active" data-weapon="0" title="Bomb">💣 Bomb</button>
            <button class="sbtn wbtn active" data-weapon="1" title="Ghost">👻 Ghost</button>
            <button class="sbtn wbtn active" data-weapon="2" title="Shotgun">🔫 Shotgun</button>
            <button class="sbtn wbtn active" data-weapon="3" title="Nuclear">☢️ Nuke</button>
          </div>
        </div>
      </div>

      <p class="hint">Any player can press <kbd>S</kbd> or tap <strong>Start</strong></p>
      <button id="startBtn" class="btn-primary">▶ Start Game</button>
    </div>
  </div>
</div>

<!-- Game Over / Winner overlay -->
<div id="gameOverOverlay" class="overlay hidden">
  <div class="overlay-card">
    <div id="gameOverTitle" class="logo"></div>
    <div id="gameOverRankings"></div>
    <div id="gameOverTimer" class="sub"></div>
    <button id="restartBtn" class="btn-primary" style="margin-top:14px">🔄 Play Again</button>
    <button id="quitBtn"    class="btn-secondary" style="margin-top:8px">🚪 Quit to Lobby</button>
  </div>
</div>

<!-- ═══════════════════════ GAME AREA ═══════════════════════ -->

<div id="gameWrapper">

  <!-- HUD bar -->
  <div id="hud">
    <div id="hudLeft">
      <span id="hudStatus"></span>
    </div>
    <div id="hudCenter">
      <span id="hudWeapons"></span>
    </div>
    <div id="hudRight">
      <span id="hudScore"></span>
    </div>
  </div>

  <!-- Spectator banner -->
  <div id="spectatorBanner" class="hidden">
    👁 Spectating — game in progress
  </div>

  <!-- Canvas -->
  <div id="canvasWrap">
    <canvas id="gameCanvas"></canvas>
    <!-- Rotate hint for portrait mobile -->
    <div id="rotateHint" class="hidden">
      📱 Rotate your device for a better experience
    </div>
  </div>

  <!-- Mobile controls -->
  <div id="mobileControls">
    <div id="dpad">
      <div class="dpad-row">
        <button class="dpad-btn" id="btnUp"    data-action="UP">▲</button>
      </div>
      <div class="dpad-row dpad-mid">
        <button class="dpad-btn" id="btnLeft"  data-action="LEFT">◀</button>
        <div class="dpad-center"></div>
        <button class="dpad-btn" id="btnRight" data-action="RIGHT">▶</button>
      </div>
      <div class="dpad-row">
        <button class="dpad-btn" id="btnDown"  data-action="DOWN">▼</button>
      </div>
    </div>
    <button id="fireBtn" class="btn-fire">🔥<br>FIRE</button>
  </div>

</div>

<script src="game.js"></script>
</body>
</html>
